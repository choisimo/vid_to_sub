name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        textual-version: ["0.80.1", "latest"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-faster-whisper.txt
            requirements-whisper.txt
            requirements-whisperx.txt

      - name: Install base requirements
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Pin Textual minimum supported version
        if: matrix.textual-version != 'latest'
        run: python -m pip install "textual==${{ matrix.textual-version }}"

      - name: Show dependency floor under test
        run: python -c "import textual; print(f'textual={textual.__version__}')"

      - name: Run unit tests
        env:
          PYTHONUNBUFFERED: "1"
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Verify module compilation
        run: python -m compileall -q vid_to_sub_app tui.py init_checker.py vid_to_sub.py
